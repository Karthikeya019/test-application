name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Deploy to dev
        run: |
          echo "Deploying to ${{ secrets.APP_ENV }}"
          echo "API: ${{ secrets.API_URL }}"

  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: qa
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Deploy to QA
        run: |
          echo "Deploying to ${{ secrets.APP_ENV }}"
          echo "API: ${{ secrets.API_URL }}"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Deploy to prod
        run: |
          echo "Deploying to ${{ secrets.APP_ENV }}"
          echo "API: ${{ secrets.API_URL }}"